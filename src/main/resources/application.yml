server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/log_management_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: admin
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.itheima.logmanagementsystem.entity
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名转换

pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
